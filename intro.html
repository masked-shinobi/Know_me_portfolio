<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi there!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: transparent !important;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            font-family: 'Satoshi', sans-serif;
            color: var(--text-primary);
        }

        .intro-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .intro-content {
            max-width: 540px;
            padding: 48px;
            background: var(--card-bg);
            border: var(--border);
            border-radius: 40px;
            box-shadow: var(--shadow);
            animation: slide-up 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* Subtle background glow */
        .intro-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(156, 184, 236, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .intro-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 2.8rem;
            margin-bottom: 24px;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .intro-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-weight: 400;
        }

        .highlight {
            color: var(--text-primary);
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .highlight::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255, 188, 0, 0.2);
            z-index: -1;
            border-radius: 4px;
        }

        @keyframes slide-up {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .intro-title { font-size: 2.2rem; }
            .intro-text { font-size: 1.05rem; }
            .intro-content { padding: 32px; border-radius: 32px; }
        }
    </style>
</head>
<body>
    <div class="intro-container">
        <div class="intro-content">
            <h1 class="intro-title">Hi there, I am <span class="highlight">Sanjay Baskar</span></h1>
            <p class="intro-text">
                I'm a <span class="highlight">Design Engineer</span> building digital products that blend creativity with robust engineering.
            </p>
            <p class="intro-text">
                Currently exploring the frontiers of <span class="highlight">AI-driven</span> software and cloud-native experiences.
            </p>
            <p class="intro-text" style="font-style: italic; opacity: 0.8; font-size: 1rem; margin-top: 32px;">
                "Non-linear thinking for a linear world."
            </p>
        </div>
    </div>

    <script>
        // Set theme based on parent if needed, though background is transparent
        window.addEventListener('message', (event) => {
            if (event.data.theme === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        });
    </script>
</body>
</html>
