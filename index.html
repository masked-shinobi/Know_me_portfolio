<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjay | Interactive Canvas</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        /* Modernized Chat Styles will be in style.css */
    </style>
</head>

<body>
    <!-- Fixed Viewport (Window) -->
    <div id="viewport">
        <div id="grid-overlay"></div>
        <!-- Draggable Stage (World) -->
        <div id="stage">
            <!-- Hero Content -->
            <div id="hero-container">
                <div class="hero-sticker-wrapper">
                    <img src="images/Hero-image.png" class="hero-sticker light-only" alt="Sticker Light">
                    <img src="images/Hero-image-dark.png" class="hero-sticker dark-only" alt="Sticker Dark">
                </div>
                <h1 id="hero-title">Non-Linear Creative.</h1>
                <p id="hero-subtitle">DESIGN ENGINEER &bull; AI &amp; WEB &amp; CLOUD ENGINEERING</p>
            </div>

            <!-- Pinned Content Placeholders -->
            <div class="card-container" style="left: 2150px; top: 1100px;">
                <span class="card-label">CARD #01 &mdash; STACK</span>
                <!-- Box Component from Uiverse -->
                <div class="box">
                    <span></span>
                    <div class="content">
                        <h2>Modern<br>Stack</h2>
                    </div>
                </div>
            </div>

            <div class="card-container" style="left: 2800px; top: 850px;">
                <span class="card-label">CARD #02 &mdash; ME</span>
                <div class="hero-character-wrapper" style="cursor: pointer;">
                    <img src="images/Hero-anime.png" class="floating-sticker" alt="Hero Anime"
                        style="width: 400px; height: auto;">
                </div>
            </div>

            <div class="card-container" style="left: 1300px; top: 1200px;">
                <span class="card-label">CARD #03 &mdash; JOURNEY</span>
                <div class="container">
                    <!-- Projects Card -->
                    <div data-text="Projects" style="--r:-15;" class="glass">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                        </svg>
                    </div>
                    <!-- Resume Card -->
                    <a href="https://drive.google.com/file/d/1QGokMLQhPTLxFkUjbR9Es9ofhuaZsnsl/view?usp=drive_link"
                        target="_blank" style="text-decoration: none;">
                        <div data-text="Resume" style="--r:5;" class="glass">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <line x1="10" y1="9" x2="8" y2="9"></line>
                            </svg>
                        </div>
                    </a>
                    <!-- Educational Journey Card -->
                    <div data-text="Education" style="--r:25;" class="glass">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="card-container" id="chat-card-container" style="left: 2300px; top: 1850px;">
                <span class="card-label">CARD #04 &mdash; SANJAY AI</span>
                <div class="chat-card">
                    <!-- Mascot -->
                    <img src="images/Chat-image.png" class="chat-character" alt="Sanjay AI">
                    
                    <div class="chat-main">
                        <!-- Single Response Bubble -->
                        <div class="chat-bubble" id="chat-bubble">
                            <p id="chat-text">Wanna have a chat with me? I'm Sanjay's AI double!</p>
                        </div>
                    </div>
                    
                    <div class="chat-input-container">
                        <input type="text" placeholder="Ask me anything..." class="chat-input-field" id="chat-input-field">
                        <div id="chat-typing-dot" class="chat-dot"></div>
                    </div>
                </div>
            </div>

            <div class="card-container" style="left: 1550px; top: 1850px;">
                <span class="card-label">CARD #05 &mdash; CONNECT</span>
                <div class="social-card">
                    <div class="social-background"></div>
                    <div class="social-logo">
                        <img src="images/Contact-logo.png" alt="Contact Logo" class="social-logo-img">
                    </div>
                    <div class="social-box social-box1">
                        <a href="mailto:maskedprogrammer.in@gmail.com" title="Email Me">
                            <span class="social-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="social-svg">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                    </path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </span>
                        </a>
                    </div>
                    <div class="social-box social-box2">
                        <a href="https://www.linkedin.com/in/masked-shinobi-30a289377/" target="_blank"
                            title="LinkedIn">
                            <span class="social-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="social-svg">
                                    <path
                                        d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z">
                                    </path>
                                    <rect x="2" y="9" width="4" height="12"></rect>
                                    <circle cx="4" cy="4" r="2"></circle>
                                </svg>
                            </span>
                        </a>
                    </div>
                    <div class="social-box social-box3">
                        <a href="https://github.com/masked-shinobi" target="_blank" title="GitHub">
                            <span class="social-icon">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="social-svg">
                                    <path
                                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                                    </path>
                                </svg>
                            </span>
                        </a>
                    </div>
                    <div class="social-box social-box4"></div>
                </div>
            </div>



            <!-- Floating Stickers -->
            <div id="sticker-1-container" class="draggable-sticker-container"
                style="left: calc(50% + 580px); top: 48%;">
                <img src="images/floating-stickers/sticker-1.png" id="sticker-1" class="floating-sticker"
                    alt="Floating Sticker 1">
            </div>
            <div id="sticker-2-container" class="draggable-sticker-container"
                style="left: calc(50% - 550px); top: 55%;">
                <img src="images/floating-stickers/sticker-2.png" id="sticker-2" class="floating-sticker"
                    alt="Floating Sticker 2">
            </div>
            <div id="sticker-3-container" class="draggable-sticker-container" style="left: 1950px; top: 1950px;">
                <img src="images/floating-stickers/sticker-3.png" id="sticker-3" class="floating-sticker"
                    alt="Floating Sticker 3">
            </div>
        </div>

        <!-- Fixed UI -->
        <nav id="navbar">
            <div class="nav-right">
                <label class="switch" title="Toggle Theme">
                    <input id="theme-checkbox" type="checkbox" />
                    <div class="slider round">
                        <div class="sun-moon">
                            <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="light-ray-2" class="light-ray" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="light-ray-3" class="light-ray" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>

                            <svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="cloud-5" class="cloud-light" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                        </div>
                        <div class="stars">
                            <svg id="star-1" class="star" viewBox="0 0 20 20">
                                <path
                                    d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z">
                                </path>
                            </svg>
                            <svg id="star-2" class="star" viewBox="0 0 20 20">
                                <path
                                    d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z">
                                </path>
                            </svg>
                            <svg id="star-3" class="star" viewBox="0 0 20 20">
                                <path
                                    d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z">
                                </path>
                            </svg>
                            <svg id="star-4" class="star" viewBox="0 0 20 20">
                                <path
                                    d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z">
                                </path>
                            </svg>
                        </div>
                    </div>
                </label>
                <a href="#">Home</a>
                <a href="#">Work</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
        </nav>

        <div id="hint">Drag to explore →</div>

        <nav id="floating-menu">
            <a href="#" title="Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <a href="#" title="Work">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
            </a>
            <a href="#" title="About">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
            <a href="#" title="Contact">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </svg>
            </a>
            <a href="#" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
                    </path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </a>
        </nav>

        <button id="recenter-btn" title="Recenter View">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M3 12h3m12 0h3M12 3v3m0 12v3"></path>
            </svg>
        </button>
    </div>

    <!-- Intro Pop Screen -->
    <div id="intro-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" id="close-modal" aria-label="Close Pop Screen">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <iframe id="intro-iframe" src="about:blank" frameborder="0"></iframe>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
