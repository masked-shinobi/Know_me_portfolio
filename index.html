<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjay | Interactive Canvas</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        /* Force Chat Card Styles - Overriding potential cache issues */
        .chat-card { width: 520px !important; height: 380px !important; position: relative !important; }
        .chat-character { width: 460px !important; position: absolute !important; bottom: -60px !important; left: -50px !important; z-index: 5 !important; }
        .chat-bubble { position: absolute !important; left: 100px !important; bottom: 220px !important; z-index: 10 !important; }
        .chat-input-container { z-index: 20 !important; }
    </style>
</head>

<body>
    <!-- Fixed Viewport (Window) -->
    <div id="viewport">
        <div id="grid-overlay"></div>
        <!-- Draggable Stage (World) -->
        <div id="stage">
            <!-- Hero Content -->
            <div id="hero-container">
                <div class="hero-sticker-wrapper">
                    <img src="images/Hero-image.png" class="hero-sticker light-only" alt="Sticker Light">
                    <img src="images/Hero-image-dark.png" class="hero-sticker dark-only" alt="Sticker Dark">
                </div>
                <h1 id="hero-title">Non-Linear Creative.</h1>
                <p id="hero-subtitle">DESIGN ENGINEER &bull; BRAND &amp; WEB</p>
            </div>

            <!-- Pinned Content Placeholders -->
            <div class="card-container" style="left: 2150px; top: 1100px;">
                <span class="card-label">CARD #01 &mdash; STACK</span>
                <!-- Box Component from Uiverse -->
                <div class="box">
                  <span></span>
                  <div class="content">
                    <h2>Modern<br>Stack</h2>
                  </div>
                </div>
            </div>

            <div class="card-container" style="left: 2800px; top: 850px;">
                <span class="card-label">CARD #02 &mdash; ME</span>
                <div class="hero-character-wrapper" style="cursor: pointer;">
                    <img src="images/Hero-anime.png" class="floating-sticker" alt="Hero Anime" style="width: 400px; height: auto;">
                </div>
            </div>

            <div class="card-container" style="left: 1300px; top: 1200px;">
                <span class="card-label">CARD #03 &mdash; JOURNEY</span>
                <div class="container">
                  <!-- Projects Card -->
                  <div data-text="Projects" style="--r:-15;" class="glass">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                  </div>
                  <!-- Resume Card -->
                  <div data-text="Resume" style="--r:5;" class="glass">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <line x1="10" y1="9" x2="8" y2="9"></line>
                    </svg>
                  </div>
                  <!-- Educational Journey Card -->
                  <div data-text="Education" style="--r:25;" class="glass">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
                    </svg>
                  </div>
                </div>
            </div>

            <div class="card-container" style="left: 2300px; top: 1850px;">
                <span class="card-label">CARD #04 &mdash; CHAT</span>
                <div class="chat-card">
                    <div class="chat-main">
                        <img src="images/Chat-image.png" class="chat-character" alt="Character">
                        <div class="chat-bubble">
                            <p id="chat-text">wanna have a chat with me?</p>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <input type="text" placeholder="Chat with him ?" class="chat-input-field" id="chat-input-field">
                    </div>
                </div>
            </div>

                        </svg>

                <img src="images/floating-stickers/sticker-1.png" id="sticker-1" class="floating-sticker" alt="Floating Sticker 1">
            </div>
            <div id="sticker-2-container" class="draggable-sticker-container" style="left: calc(50% - 550px); top: 55%;">
                <img src="images/floating-stickers/sticker-2.png" id="sticker-2" class="floating-sticker" alt="Floating Sticker 2">
            </div>
            <div id="sticker-3-container" class="draggable-sticker-container" style="left: 1950px; top: 1950px;">
                <img src="images/floating-stickers/sticker-3.png" id="sticker-3" class="floating-sticker" alt="Floating Sticker 3">
            </div>
        </div>

        <!-- Fixed UI -->
        <nav id="navbar">
            <div class="nav-right">
                <label class="switch" title="Toggle Theme">
                    <input id="theme-checkbox" type="checkbox" />
                    <div class="slider round">
                        <div class="sun-moon">
                            <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
                            </svg>
                            <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100">

                            </svg>

                            </svg>
                            <svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="50"></circle>
